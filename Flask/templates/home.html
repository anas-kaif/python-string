<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; padding: 0;
            background: #f4f4f9;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        nav {
            background: #34495e;
            display: flex;
            justify-content: center;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            transition: background 0.3s;
        }
        nav a:hover {
            background: #1abc9c;
        }
        .container {
            padding: 40px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            background: #1abc9c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #16a085;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0; width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Student Management System</h1>
    </header>

    <nav>
        <a href="/students">Students</a>
        <a href="/courses">Courses</a>
        <a href="/admin">Admin</a>
        <a href="/contact">Contact</a>
    </nav>

    <div class="container">
        <h2>Manage Students, Courses & More</h2>
        <p>This system helps you organize student records, course details, and administration efficiently.</p>
        <a href="/students" class="btn">View Students</a>
        <a href="/courses" class="btn">View Courses</a>
        <a href="/admin" class="btn">Admin Panel</a>
    </div>

    <footer>
        <p>&copy; 2026 Student Management System | Developed with Flask</p>
    </footer>
</body>
</html>
